<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fish and chips (Polina) </title>
	<link rel="stylesheet" href="style.css">
	<style>

		body{
			max-width: 58rem;
			margin: 1rem;
		}
		.color{
			width: max-content;
		}
		.swatch{
			width: 2.54cm;
			aspect-ratio: 1;
		}
		.label{
			font-family: monospace;
			border-top: 1px solid #CCC;
			padding-top: 0.5em;
			margin-top: 0.5em;
		}
	</style>

</head>
<body>
	<section id="Identite">

		<article id="Logo">
			<h2>Logo</h2>
			<img src="Ресурс 2.svg" alt="Logo Fish and Chips">
		</article>

		<article id="AppLication">
			<h2>Application</h2>
			<img src="fish_and_chips_foodtrack.png" alt="Image du camion decoré">
		</article>

		<article id="web">
			<h2>Maquette de site web</h2>

			<div class="row">
				<div>
					<h3>Page d'acceuil</h3>
					<img src="page-web-01.jpg" alt="Maquette web mobile">
				</div>

				<div>
					<h3>Menu</h3>
					<img src="page-web-01.jpg" alt="Maquette web mobile">
				</div>

				<div>
					<h3>Horaire</h3>
					<img src="page-web-01.jpg" alt="Maquette web mobile">
				</div>

			</div><!-- fin.row -->

		</article>
	</section>


	<section id="CharteGraphique">

		<article id="Couleur">
			<h1>Couleur</h1>

			<script src="swatches.js"></script>

			<div class="color">
				<h3>«Fiesta»</h3>
				<div class="swatch" style="background: var(--couleurPrincipale)"></div>
				<p class="label" data-color-format="hex"></p>
				<p class="label" data-color-format="rgb"></p>
				<p class="label" data-color-format="hsl"></p>
				<p class="label" data-color-format="lab"></p>
				<p class="label" data-color-format="cmyk"></p>
			</div>

			<div class="color">
				<h3>«Blue»</h3>
				<div class="swatch" style="background: var(--couleurSecondaire)"></div>
				<p class="label" data-color-format="hex"></p>
				<p class="label" data-color-format="rgb"></p>
				<p class="label" data-color-format="hsl"></p>
				<p class="label" data-color-format="lab"></p>
				<p class="label" data-color-format="cmyk"></p>
			</div>
			<div class="color">
				<h3>Mix</h3>
				<div class="swatch" style="background: color-mix(in srgb, var(--couleurPrincipale), var(--couleurSecondaire))"></div>
				<p class="label" data-color-format="hex"></p>
				<p class="label" data-color-format="rgb"></p>
				<p class="label" data-color-format="hsl"></p>
				<p class="label" data-color-format="lab"></p>
				<p class="label" data-color-format="cmyk"></p>
			</div>

			<div class="color">
				<h3>Fiesta</h3>
				<div class="swatch" style="background-color: hsl(from var(--couleurPrincipale) h s 25)"></div>
				<p class="label" data-color-format="hex"></p>
				<p class="label" data-color-format="rgb"></p>

			</div>
		</article>
		<!-- #Couleur -->

	</section>
	<!-- #CharteGraphique -->
</body>
</html>
